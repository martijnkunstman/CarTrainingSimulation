<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Training Simulation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #0d1117;
      font-family: 'Segoe UI', Arial, sans-serif;
      user-select: none;
    }

    #canvas { display: block; width: 100vw; height: 100vh; }

    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #e6edf3;
      background: rgba(13, 17, 23, 0.82);
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 13px;
      line-height: 1.8;
      backdrop-filter: blur(6px);
      min-width: 160px;
    }
    #hud .label { color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
    #hud .value { color: #58a6ff; font-weight: bold; font-size: 15px; }

    #reset-btn {
      margin-top: 10px;
      width: 100%;
      padding: 6px 0;
      background: rgba(88, 166, 255, 0.15);
      border: 1px solid rgba(88, 166, 255, 0.4);
      border-radius: 6px;
      color: #58a6ff;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #reset-btn:hover { background: rgba(88, 166, 255, 0.3); }

    #controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      background: rgba(13, 17, 23, 0.85);
      padding: 16px 24px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
    }

    .wheel-ctrl {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 48px;
    }

    .wheel-name {
      color: #8b949e;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .slider-wrap {
      position: relative;
      height: 130px;
      width: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slider-wrap::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      height: 1px;
      background: rgba(255,255,255,0.15);
      pointer-events: none;
    }

    input[type=range].vslider {
      -webkit-appearance: slider-vertical;
      writing-mode: vertical-lr;
      direction: rtl;
      width: 36px;
      height: 128px;
      cursor: pointer;
      accent-color: #58a6ff;
    }

    .motor-val {
      color: #58a6ff;
      font-size: 12px;
      font-weight: bold;
      min-width: 40px;
      text-align: center;
    }

    .spin-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #30363d;
      transition: background 0.1s;
    }
    .spin-dot.spinning { background: #f85149; box-shadow: 0 0 6px #f85149; }

    #legend {
      position: fixed;
      bottom: 24px;
      right: 16px;
      color: #8b949e;
      font-size: 11px;
      line-height: 1.8;
      text-align: right;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="hud">
  <div class="label">Speed</div>
  <div class="value"><span id="speed">0.00</span> m/s</div>
  <div class="label" style="margin-top:6px">Heading</div>
  <div class="value"><span id="heading">0</span>&deg;</div>
  <button id="reset-btn">&#8635; Reset</button>
</div>

<div id="controls">
  <div class="wheel-ctrl">
    <div class="wheel-name">FL</div>
    <div class="slider-wrap">
      <input type="range" class="vslider" id="s0" min="-100" max="100" value="0">
    </div>
    <div class="motor-val" id="v0">0%</div>
    <div class="spin-dot" id="d0"></div>
  </div>
  <div class="wheel-ctrl">
    <div class="wheel-name">FR</div>
    <div class="slider-wrap">
      <input type="range" class="vslider" id="s1" min="-100" max="100" value="0">
    </div>
    <div class="motor-val" id="v1">0%</div>
    <div class="spin-dot" id="d1"></div>
  </div>
  <div class="wheel-ctrl">
    <div class="wheel-name">RL</div>
    <div class="slider-wrap">
      <input type="range" class="vslider" id="s2" min="-100" max="100" value="0">
    </div>
    <div class="motor-val" id="v2">0%</div>
    <div class="spin-dot" id="d2"></div>
  </div>
  <div class="wheel-ctrl">
    <div class="wheel-name">RR</div>
    <div class="slider-wrap">
      <input type="range" class="vslider" id="s3" min="-100" max="100" value="0">
    </div>
    <div class="motor-val" id="v3">0%</div>
    <div class="spin-dot" id="d3"></div>
  </div>
</div>

<div id="legend">
  <b>Keyboard</b><br>
  Q / A &nbsp;= FL forward / reverse<br>
  W / S &nbsp;= FR forward / reverse<br>
  E / D &nbsp;= RL forward / reverse<br>
  R / F &nbsp;&nbsp;= RR forward / reverse<br>
  <br>
  Hold key to accelerate &mdash; release to auto-center
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import * as CANNON from 'https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js';

// CONFIG
const WHEEL_RADIUS    = 0.35;
const WHEEL_WIDTH     = 0.25;
const CAR_BODY_W      = 1.6;
const CAR_BODY_L      = 2.4;
const CAR_BODY_H      = 0.28;
const WHEEL_X_OUT     = 0.08;
const WHEEL_Z_IN      = 0.45;
const CAR_MASS        = 180;
const WHEEL_MASS      = 10;
const MAX_MOTOR_SPEED = 18;
const MAX_MOTOR_FORCE = 350;
const GRIP            = 0.88;
const SPIN_THRESHOLD  = 3;

const START_Y = WHEEL_RADIUS + CAR_BODY_H * 0.5 + 0.12;

const WX = CAR_BODY_W * 0.5 + WHEEL_X_OUT + WHEEL_WIDTH * 0.5;
const WY = WHEEL_RADIUS - START_Y;
const WZ = CAR_BODY_L * 0.5 - WHEEL_Z_IN;

const WHEEL_OFFSETS = [
  new CANNON.Vec3(-WX, WY,  WZ),
  new CANNON.Vec3( WX, WY,  WZ),
  new CANNON.Vec3(-WX, WY, -WZ),
  new CANNON.Vec3( WX, WY, -WZ),
];

// THREE.JS SETUP
const canvas   = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled   = true;
renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2535);
scene.fog        = new THREE.FogExp2(0x1a2535, 0.018);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 600);
camera.position.set(0, 5, -10);
camera.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0xffffff, 0.55));

const sun = new THREE.DirectionalLight(0xfff5e0, 1.1);
sun.position.set(15, 30, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near   = 0.5;
sun.shadow.camera.far    = 200;
sun.shadow.camera.left   = -40;
sun.shadow.camera.right  = 40;
sun.shadow.camera.top    = 40;
sun.shadow.camera.bottom = -40;
sun.shadow.bias          = -0.001;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x4488aa, 0x223322, 0.4));

const groundMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(300, 300),
  new THREE.MeshLambertMaterial({ color: 0x2a3d2a })
);
groundMesh.rotation.x = -Math.PI / 2;
groundMesh.receiveShadow = true;
scene.add(groundMesh);

const grid = new THREE.GridHelper(300, 60, 0x000000, 0x1e3a1e);
grid.material.opacity     = 0.6;
grid.material.transparent = true;
scene.add(grid);

(function makeMarkers() {
  const geo = new THREE.BoxGeometry(1, 0.05, 1);
  const mat = new THREE.MeshLambertMaterial({ color: 0x3a5a3a });
  for (let x = -6; x <= 6; x += 3) {
    for (let z = -30; z <= 30; z += 3) {
      if ((x + z) % 6 === 0) {
        const m = new THREE.Mesh(geo, mat);
        m.position.set(x * 2, 0.025, z * 2);
        m.receiveShadow = true;
        scene.add(m);
      }
    }
  }
})();

// CAR VISUAL
const carGroup = new THREE.Group();
scene.add(carGroup);

const chassisMat = new THREE.MeshPhongMaterial({ color: 0xcc2233, shininess: 120 });
const chassisMesh = new THREE.Mesh(new THREE.BoxGeometry(CAR_BODY_W, CAR_BODY_H, CAR_BODY_L), chassisMat);
chassisMesh.castShadow = true;
chassisMesh.receiveShadow = true;
carGroup.add(chassisMesh);

const cabinMesh = new THREE.Mesh(
  new THREE.BoxGeometry(CAR_BODY_W * 0.72, CAR_BODY_H * 1.4, CAR_BODY_L * 0.48),
  new THREE.MeshPhongMaterial({ color: 0x223344, shininess: 200, transparent: true, opacity: 0.85 })
);
cabinMesh.position.set(0, CAR_BODY_H * 1.2, -CAR_BODY_L * 0.04);
cabinMesh.castShadow = true;
carGroup.add(cabinMesh);

const bumper = new THREE.Mesh(
  new THREE.BoxGeometry(CAR_BODY_W * 0.9, CAR_BODY_H * 0.5, 0.1),
  new THREE.MeshPhongMaterial({ color: 0x888888, shininess: 200 })
);
bumper.position.set(0, -CAR_BODY_H * 0.25, CAR_BODY_L * 0.5 + 0.05);
carGroup.add(bumper);

[-0.5, 0.5].forEach(sx => {
  const h = new THREE.Mesh(
    new THREE.BoxGeometry(0.22, 0.1, 0.06),
    new THREE.MeshPhongMaterial({ color: 0xffffcc, emissive: 0xffffaa, emissiveIntensity: 0.8 })
  );
  h.position.set(sx * CAR_BODY_W * 0.72, -CAR_BODY_H * 0.05, CAR_BODY_L * 0.5 + 0.04);
  carGroup.add(h);

  const t = new THREE.Mesh(
    new THREE.BoxGeometry(0.18, 0.1, 0.06),
    new THREE.MeshPhongMaterial({ color: 0xff2200, emissive: 0xff1100, emissiveIntensity: 0.5 })
  );
  t.position.set(sx * CAR_BODY_W * 0.72, -CAR_BODY_H * 0.05, -CAR_BODY_L * 0.5 - 0.04);
  carGroup.add(t);
});

function makeWheelMesh() {
  const g = new THREE.Group();
  const rimMat = new THREE.MeshPhongMaterial({ color: 0xcccccc, shininess: 300 });

  const tire = new THREE.Mesh(
    new THREE.CylinderGeometry(WHEEL_RADIUS, WHEEL_RADIUS, WHEEL_WIDTH, 28),
    new THREE.MeshPhongMaterial({ color: 0x151515, shininess: 20 })
  );
  tire.rotation.z = Math.PI / 2;
  tire.castShadow = true;
  g.add(tire);

  const rim = new THREE.Mesh(
    new THREE.CylinderGeometry(WHEEL_RADIUS * 0.62, WHEEL_RADIUS * 0.62, WHEEL_WIDTH + 0.01, 16),
    rimMat
  );
  rim.rotation.z = Math.PI / 2;
  g.add(rim);

  for (let s = 0; s < 5; s++) {
    const spoke = new THREE.Mesh(
      new THREE.BoxGeometry(WHEEL_WIDTH + 0.02, WHEEL_RADIUS * 0.08, WHEEL_RADIUS * 1.1),
      rimMat
    );
    spoke.rotation.x = (s / 5) * Math.PI * 2;
    g.add(spoke);
  }

  const hub = new THREE.Mesh(
    new THREE.CylinderGeometry(WHEEL_RADIUS * 0.18, WHEEL_RADIUS * 0.18, WHEEL_WIDTH + 0.02, 12),
    new THREE.MeshPhongMaterial({ color: 0x444466, shininess: 200 })
  );
  hub.rotation.z = Math.PI / 2;
  g.add(hub);

  return g;
}

const wheelMeshes = WHEEL_OFFSETS.map(() => {
  const m = makeWheelMesh();
  scene.add(m);
  return m;
});

// CANNON-ES PHYSICS
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.81, 0) });
world.broadphase = new CANNON.SAPBroadphase(world);
world.allowSleep = false;

const matGround = new CANNON.Material('ground');
const matWheel  = new CANNON.Material('wheel');
const matBody   = new CANNON.Material('body');

world.addContactMaterial(new CANNON.ContactMaterial(matWheel, matGround, {
  friction:                   0.72,
  restitution:                0.05,
  contactEquationStiffness:   1e8,
  contactEquationRelaxation:  3,
  frictionEquationStiffness:  1e8,
}));
world.addContactMaterial(new CANNON.ContactMaterial(matBody, matGround, {
  friction: 0.4, restitution: 0.1,
}));

const groundBody = new CANNON.Body({ mass: 0, material: matGround });
groundBody.addShape(new CANNON.Plane());
groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
world.addBody(groundBody);

let carBody = null;
let wheelBodies = [];
let wheelConstraints = [];

function buildCar() {
  if (carBody) {
    world.removeBody(carBody);
    wheelBodies.forEach(wb => world.removeBody(wb));
    wheelConstraints.forEach(c => world.removeConstraint(c));
  }

  carBody = new CANNON.Body({
    mass: CAR_MASS, material: matBody,
    linearDamping: 0.06, angularDamping: 0.35,
  });
  carBody.addShape(new CANNON.Box(new CANNON.Vec3(CAR_BODY_W / 2, CAR_BODY_H / 2, CAR_BODY_L / 2)));
  carBody.position.set(0, START_Y, 0);
  world.addBody(carBody);

  wheelBodies      = [];
  wheelConstraints = [];

  WHEEL_OFFSETS.forEach(offset => {
    const wb = new CANNON.Body({
      mass: WHEEL_MASS, material: matWheel,
      linearDamping: 0.05, angularDamping: 0.5,
    });

    const shape = new CANNON.Cylinder(WHEEL_RADIUS, WHEEL_RADIUS, WHEEL_WIDTH, 24);
    const sq = new CANNON.Quaternion();
    sq.setFromAxisAngle(new CANNON.Vec3(0, 0, 1), Math.PI / 2);
    wb.addShape(shape, new CANNON.Vec3(), sq);

    const wo = new CANNON.Vec3();
    carBody.quaternion.vmult(offset, wo);
    wb.position.set(
      carBody.position.x + wo.x,
      carBody.position.y + wo.y,
      carBody.position.z + wo.z
    );
    world.addBody(wb);
    wheelBodies.push(wb);

    const c = new CANNON.HingeConstraint(carBody, wb, {
      pivotA: offset,
      axisA:  new CANNON.Vec3(1, 0, 0),
      pivotB: new CANNON.Vec3(0, 0, 0),
      axisB:  new CANNON.Vec3(1, 0, 0),
      collideConnected: false,
    });
    c.enableMotor();
    c.setMotorSpeed(0);
    c.setMotorMaxForce(0);
    world.addConstraint(c);
    wheelConstraints.push(c);
  });
}

buildCar();

// SLIDER + KEYBOARD STATE
const sliderValues  = [0, 0, 0, 0];
const sliderPressed = [false, false, false, false];
const SPRING_RATE   = 0.12;
const KEY_RATE      = 0.055;

// keyPress[i] = +1 (forward), -1 (reverse), 0 (idle)
const keyPress = [0, 0, 0, 0];

// Q/A = FL   W/S = FR   E/D = RL   R/F = RR
const KEY_MAP = {
  KeyQ: [0,  1], KeyA: [0, -1],
  KeyW: [1,  1], KeyS: [1, -1],
  KeyE: [2,  1], KeyD: [2, -1],
  KeyR: [3,  1], KeyF: [3, -1],
};

window.addEventListener('keydown', e => {
  if (e.repeat) return;
  const m = KEY_MAP[e.code];
  if (m) { keyPress[m[0]] = m[1]; sliderPressed[m[0]] = true; }
});
window.addEventListener('keyup', e => {
  const m = KEY_MAP[e.code];
  if (m && keyPress[m[0]] === m[1]) {
    keyPress[m[0]] = 0;
    sliderPressed[m[0]] = false;
  }
});

for (let i = 0; i < 4; i++) {
  const slider = document.getElementById(`s${i}`);
  const valEl  = document.getElementById(`v${i}`);
  slider.addEventListener('input', () => {
    sliderValues[i] = parseInt(slider.value) / 100;
    valEl.textContent = slider.value + '%';
  });
  slider.addEventListener('mousedown',   () => { sliderPressed[i] = true; });
  slider.addEventListener('touchstart',  () => { sliderPressed[i] = true; }, { passive: true });
  slider.addEventListener('mouseup',     () => { sliderPressed[i] = false; });
  slider.addEventListener('touchend',    () => { sliderPressed[i] = false; });
  slider.addEventListener('touchcancel', () => { sliderPressed[i] = false; });
}
window.addEventListener('mouseup', () => {
  for (let i = 0; i < 4; i++) {
    if (keyPress[i] === 0) sliderPressed[i] = false;
  }
});

document.getElementById('reset-btn').addEventListener('click', () => {
  buildCar();
  for (let i = 0; i < 4; i++) {
    sliderValues[i] = 0;
    sliderPressed[i] = false;
    keyPress[i] = 0;
    document.getElementById(`s${i}`).value = 0;
    document.getElementById(`v${i}`).textContent = '0%';
  }
});

// ANIMATION LOOP
const _axle      = new CANNON.Vec3();
const _latV      = new CANNON.Vec3();
const camDesired = new THREE.Vector3();
const camLookAt  = new THREE.Vector3();
const FWD        = new THREE.Vector3(0, 0, 1);
let   lastTime   = null;

function animate(time) {
  requestAnimationFrame(animate);

  const dt = lastTime !== null ? Math.min((time - lastTime) / 1000, 0.05) : 1 / 60;
  lastTime = time;

  // Keyboard drives sliders; spring back when released
  for (let i = 0; i < 4; i++) {
    if (keyPress[i] !== 0) {
      sliderValues[i] = Math.max(-1, Math.min(1, sliderValues[i] + keyPress[i] * KEY_RATE));
    } else if (!sliderPressed[i] && Math.abs(sliderValues[i]) > 0.001) {
      sliderValues[i] *= (1 - SPRING_RATE);
      if (Math.abs(sliderValues[i]) < 0.01) sliderValues[i] = 0;
    }
    const pct = Math.round(sliderValues[i] * 100);
    document.getElementById(`s${i}`).value = pct;
    document.getElementById(`v${i}`).textContent = pct + '%';
  }

  // Apply motors
  for (let i = 0; i < 4; i++) {
    const v = sliderValues[i];
    wheelConstraints[i].setMotorSpeed(v * MAX_MOTOR_SPEED);
    wheelConstraints[i].setMotorMaxForce(Math.abs(v) * MAX_MOTOR_FORCE);
  }

  // Lateral grip
  _axle.set(1, 0, 0);
  carBody.quaternion.vmult(_axle, _axle);

  wheelBodies.forEach(wb => {
    const vDot = wb.velocity.dot(_axle);
    _latV.set(_axle.x * vDot, _axle.y * vDot, _axle.z * vDot);
    wb.velocity.x -= _latV.x * GRIP;
    wb.velocity.y -= _latV.y * GRIP;
    wb.velocity.z -= _latV.z * GRIP;
  });

  const cbDot = carBody.velocity.dot(_axle);
  carBody.velocity.x -= _axle.x * cbDot * (GRIP * 0.7);
  carBody.velocity.y -= _axle.y * cbDot * (GRIP * 0.7);
  carBody.velocity.z -= _axle.z * cbDot * (GRIP * 0.7);

  world.step(1 / 60, dt, 3);

  // Sync meshes
  carGroup.position.copy(carBody.position);
  carGroup.quaternion.copy(carBody.quaternion);
  wheelBodies.forEach((wb, i) => {
    wheelMeshes[i].position.copy(wb.position);
    wheelMeshes[i].quaternion.copy(wb.quaternion);
  });

  // Spin indicators
  wheelBodies.forEach((wb, i) => {
    const spinning = wb.angularVelocity.length() > wb.velocity.length() / WHEEL_RADIUS + SPIN_THRESHOLD
                     && wb.angularVelocity.length() > 1;
    document.getElementById(`d${i}`).classList.toggle('spinning', spinning);
  });

  // Camera follow
  const localOff = new THREE.Vector3(0, 3.5, -8).applyQuaternion(carGroup.quaternion);
  camDesired.copy(carGroup.position).add(localOff);
  camera.position.lerp(camDesired, 0.06);
  camLookAt.lerp(
    new THREE.Vector3(carGroup.position.x, carGroup.position.y + 0.5, carGroup.position.z),
    0.08
  );
  camera.lookAt(camLookAt);

  // HUD
  const vel = carBody.velocity;
  document.getElementById('speed').textContent =
    Math.sqrt(vel.x * vel.x + vel.z * vel.z).toFixed(2);
  const fw = FWD.clone().applyQuaternion(carGroup.quaternion);
  const h  = Math.round(Math.atan2(fw.x, fw.z) * 180 / Math.PI);
  document.getElementById('heading').textContent = ((h % 360) + 360) % 360;

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate(0);
</script>
</body>
</html>
