<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Training Simulation</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="canvas"></canvas>

<div id="hud">
  <div class="label">Speed</div>
  <div class="value"><span id="speed">0.00</span> m/s</div>
  <div class="label" style="margin-top:6px">Heading</div>
  <div class="value"><span id="heading">0</span>°</div>
  <button id="reset-btn">↺ Reset</button>
</div>

<div id="sensor-hud">
  <div class="s-title">Sensors (m)</div>
  <!-- rows injected by sensors.js -->
</div>

<div id="controls">
  <div class="wheel-ctrl">
    <div class="wheel-name">FL</div>
    <div class="slider-wrap">
      <input type="range" class="vslider" id="s0" min="-100" max="100" value="0">
    </div>
    <div class="motor-val" id="v0">0%</div>
    <div class="spin-dot" id="d0"></div>
  </div>
  <div class="wheel-ctrl">
    <div class="wheel-name">FR</div>
    <div class="slider-wrap">
      <input type="range" class="vslider" id="s1" min="-100" max="100" value="0">
    </div>
    <div class="motor-val" id="v1">0%</div>
    <div class="spin-dot" id="d1"></div>
  </div>
  <div class="wheel-ctrl">
    <div class="wheel-name">RL</div>
    <div class="slider-wrap">
      <input type="range" class="vslider" id="s2" min="-100" max="100" value="0">
    </div>
    <div class="motor-val" id="v2">0%</div>
    <div class="spin-dot" id="d2"></div>
  </div>
  <div class="wheel-ctrl">
    <div class="wheel-name">RR</div>
    <div class="slider-wrap">
      <input type="range" class="vslider" id="s3" min="-100" max="100" value="0">
    </div>
    <div class="motor-val" id="v3">0%</div>
    <div class="spin-dot" id="d3"></div>
  </div>
</div>

<div id="minimap-wrap">
  <canvas id="minimap" width="180" height="180"></canvas>
  <div class="mm-zoom">
    <button id="mm-minus" title="Zoom out">−</button>
    <button id="mm-plus"  title="Zoom in">+</button>
  </div>
</div>

<div id="legend">
  <b>Keyboard</b><br>
  Q / A &nbsp;= FL forward / reverse<br>
  W / S &nbsp;= FR forward / reverse<br>
  E / D &nbsp;= RL forward / reverse<br>
  R / F &nbsp;&nbsp;= RR forward / reverse<br>
  <br>
  Hold key to accelerate &mdash; release to auto-center<br>
  <span style="color:#58a6ff">QWER = forward &nbsp; ASDF = reverse</span>
</div>

<script type="importmap">
{
  "imports": {
    "three":        "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "cannon-es":    "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>
<div id="version">v1.8</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
