<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Training Simulation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #0d1117;
      font-family: 'Segoe UI', Arial, sans-serif;
      user-select: none;
    }

    #canvas { display: block; width: 100vw; height: 100vh; }

    /* HUD overlay */
    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #e6edf3;
      background: rgba(13, 17, 23, 0.82);
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 13px;
      line-height: 1.8;
      backdrop-filter: blur(6px);
      min-width: 160px;
    }
    #hud .label { color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
    #hud .value { color: #58a6ff; font-weight: bold; font-size: 15px; }

    #reset-btn {
      margin-top: 10px;
      width: 100%;
      padding: 6px 0;
      background: rgba(88, 166, 255, 0.15);
      border: 1px solid rgba(88, 166, 255, 0.4);
      border-radius: 6px;
      color: #58a6ff;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #reset-btn:hover { background: rgba(88, 166, 255, 0.3); }

    /* Sensor HUD */
    #sensor-hud {
      position: fixed;
      top: 16px;
      right: 16px;
      color: #e6edf3;
      background: rgba(13, 17, 23, 0.82);
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 11px;
      backdrop-filter: blur(6px);
      min-width: 170px;
    }
    #sensor-hud .s-title {
      color: #8b949e;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .s-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .s-label {
      width: 36px;
      color: #8b949e;
      font-size: 10px;
      text-align: right;
    }
    .s-bar-bg {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
    }
    .s-bar-fill {
      height: 100%;
      border-radius: 3px;
      width: 100%;
      background: #3fb950;
      transition: width 0.05s, background 0.05s;
    }
    .s-dist {
      width: 30px;
      text-align: right;
      font-size: 10px;
      color: #58a6ff;
    }

    /* Wheel controls */
    #controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      background: rgba(13, 17, 23, 0.85);
      padding: 16px 24px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
    }

    .wheel-ctrl {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 48px;
    }

    .wheel-name {
      color: #8b949e;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .slider-wrap {
      position: relative;
      height: 130px;
      width: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slider-wrap::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      height: 1px;
      background: rgba(255,255,255,0.15);
      pointer-events: none;
    }

    input[type=range].vslider {
      -webkit-appearance: slider-vertical;
      writing-mode: vertical-lr;
      direction: rtl;
      width: 36px;
      height: 128px;
      cursor: pointer;
      accent-color: #58a6ff;
    }

    .motor-val {
      color: #58a6ff;
      font-size: 12px;
      font-weight: bold;
      min-width: 40px;
      text-align: center;
    }

    .spin-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #30363d;
      transition: background 0.1s;
    }
    .spin-dot.spinning { background: #f85149; box-shadow: 0 0 6px #f85149; }

    #legend {
      position: fixed;
      bottom: 24px;
      right: 16px;
      color: #8b949e;
      font-size: 11px;
      line-height: 1.8;
      text-align: right;
    }

    /* Mini-map */
    #minimap {
      position: fixed;
      bottom: 24px;
      left: 16px;
      width: 180px;
      height: 180px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(13, 17, 23, 0.82);
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="hud">
  <div class="label">Speed</div>
  <div class="value"><span id="speed">0.00</span> m/s</div>
  <div class="label" style="margin-top:6px">Heading</div>
  <div class="value"><span id="heading">0</span>&deg;</div>
  <button id="reset-btn">&circlearrowleft; Reset</button>
</div>

<div id="sensor-hud">
  <div class="s-title">Sensors (m)</div>
  <!-- rows injected by JS -->
</div>

<div id="controls">
  <div class="wheel-ctrl">
    <div class="wheel-name">FL</div>
    <div class="slider-wrap">
      <input type="range" class="vslider" id="s0" min="-100" max="100" value="0">
    </div>
    <div class="motor-val" id="v0">0%</div>
    <div class="spin-dot" id="d0"></div>
  </div>
  <div class="wheel-ctrl">
    <div class="wheel-name">FR</div>
    <div class="slider-wrap">
      <input type="range" class="vslider" id="s1" min="-100" max="100" value="0">
    </div>
    <div class="motor-val" id="v1">0%</div>
    <div class="spin-dot" id="d1"></div>
  </div>
  <div class="wheel-ctrl">
    <div class="wheel-name">RL</div>
    <div class="slider-wrap">
      <input type="range" class="vslider" id="s2" min="-100" max="100" value="0">
    </div>
    <div class="motor-val" id="v2">0%</div>
    <div class="spin-dot" id="d2"></div>
  </div>
  <div class="wheel-ctrl">
    <div class="wheel-name">RR</div>
    <div class="slider-wrap">
      <input type="range" class="vslider" id="s3" min="-100" max="100" value="0">
    </div>
    <div class="motor-val" id="v3">0%</div>
    <div class="spin-dot" id="d3"></div>
  </div>
</div>

<canvas id="minimap" width="180" height="180"></canvas>

<div id="legend">
  <b>Keyboard</b><br>
  Q / A &nbsp;= FL forward / reverse<br>
  W / S &nbsp;= FR forward / reverse<br>
  E / D &nbsp;= RL forward / reverse<br>
  R / F &nbsp;&nbsp;= RR forward / reverse<br>
  <br>
  Hold key to accelerate &mdash; release to auto-center
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import * as CANNON from 'https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js';

// ─── CONFIG ───────────────────────────────────────────────────────────────────
const WHEEL_RADIUS    = 0.35;
const WHEEL_WIDTH     = 0.25;
const CAR_BODY_W      = 1.6;
const CAR_BODY_L      = 2.4;
const CAR_BODY_H      = 0.28;
const WHEEL_X_OUT     = 0.08;
const WHEEL_Z_IN      = 0.45;
const CAR_MASS        = 180;
const WHEEL_MASS      = 10;
const MAX_MOTOR_SPEED = 18;
const MAX_MOTOR_FORCE = 350;
const GRIP            = 0.88;
const SPIN_THRESHOLD  = 3;
const START_Y         = WHEEL_RADIUS + CAR_BODY_H * 0.5 + 0.12;

// Track geometry
const TRACK_HALF_W  = 5.5;   // half-width of road (total road = 11 m)
const WALL_H        = 1.2;   // wall height (m)
const WALL_T        = 0.4;   // wall thickness (m)
const N_ROAD        = 300;   // road ribbon segments
const N_WALLS       = 200;   // wall segments per side

// Sensor config
const SENSOR_ANGLES = [-90, -60, -35, -15, 0, 15, 35, 60, 90]; // degrees from forward
const SENSOR_LENGTH = 8.0;   // metres

const WX = CAR_BODY_W * 0.5 + WHEEL_X_OUT + WHEEL_WIDTH * 0.5;
const WY = WHEEL_RADIUS - START_Y;
const WZ = CAR_BODY_L * 0.5 - WHEEL_Z_IN;

const WHEEL_OFFSETS = [
  new CANNON.Vec3(-WX, WY,  WZ),
  new CANNON.Vec3( WX, WY,  WZ),
  new CANNON.Vec3(-WX, WY, -WZ),
  new CANNON.Vec3( WX, WY, -WZ),
];

// ─── THREE.JS SETUP ───────────────────────────────────────────────────────────
const canvas   = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled   = true;
renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2535);
scene.fog        = new THREE.FogExp2(0x1a2535, 0.012);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 600);
camera.position.set(0, 5, -10);
camera.lookAt(0, 0, 0);

const ambient = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff5e0, 1.1);
sun.position.set(15, 30, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near   = 0.5;
sun.shadow.camera.far    = 300;
sun.shadow.camera.left   = -80;
sun.shadow.camera.right  = 80;
sun.shadow.camera.top    = 80;
sun.shadow.camera.bottom = -80;
sun.shadow.bias          = -0.001;
scene.add(sun);

const fill = new THREE.HemisphereLight(0x4488aa, 0x223322, 0.4);
scene.add(fill);

// Ground (under the whole scene)
const groundGeo  = new THREE.PlaneGeometry(400, 400, 1, 1);
const groundMat  = new THREE.MeshLambertMaterial({ color: 0x2a3d2a });
const groundMesh = new THREE.Mesh(groundGeo, groundMat);
groundMesh.rotation.x = -Math.PI / 2;
groundMesh.receiveShadow = true;
scene.add(groundMesh);

const grid = new THREE.GridHelper(400, 80, 0x000000, 0x1e3a1e);
grid.material.opacity     = 0.4;
grid.material.transparent = true;
scene.add(grid);

// ─── TRACK ────────────────────────────────────────────────────────────────────
// Open track — start ≠ finish.  Designed as one large non-crossing loop:
//   • Left channel runs north  (x ≈ -10 .. 30)
//   • Top sweeper connects     (x ≈ 30 .. 175)
//   • Right channel runs south (x ≈ 155 .. 180)
//   • Bottom return runs west  (x ≈ 40 .. 155, z < 38)
// The left channel and bottom return are at least 32 m apart, so the
// 11 m wide road never overlaps itself.
const trackCtrl = [
  [  8,   0],  // START — heading N along left channel
  [  2,  38],  // slight left drift
  [ -8,  72],  // gentle left S
  [ -4, 105],  // back right
  [ 10, 135],  // right sweep begins
  [ 28, 158],  // right curve
  [ 55, 175],  // apex top-left corner
  [ 88, 182],  // top straight heading E
  [122, 180],  // continuing E
  [150, 168],  // right channel begins
  [170, 148],  // tight right
  [178, 120],  // heading S
  [176,  88],  // slight left (straight)
  [168,  58],  // left curve
  [152,  35],  // heading W (bottom channel)
  [128,  18],  // chicane kink
  [102,  10],  // heading W
  [ 76,  10],  // long W straight
  [ 56,  20],  // gentle left
  [ 40,  36],  // FINISH
].map(([x, z]) => new THREE.Vector3(x, 0, z));

const trackCurve = new THREE.CatmullRomCurve3(trackCtrl, false, 'catmullrom', 0.5);

// Car starts near point [0,0] on the track; spawn at curve t=0 + a bit above ground
const startPt  = trackCurve.getPoint(0);
const startTan = trackCurve.getTangent(0);
const SPAWN_X  = startPt.x;
const SPAWN_Z  = startPt.z;
// Heading angle so car faces the track tangent direction
const SPAWN_ANGLE = Math.atan2(startTan.x, startTan.z);

function buildTrack() {
  // ── Road ribbon ──────────────────────────────────────────────────────────
  const pts = trackCurve.getSpacedPoints(N_ROAD);
  const roadVerts = [];
  const roadUVs   = [];
  const roadIdx   = [];

  for (let i = 0; i <= N_ROAD; i++) {
    const p  = pts[i];
    const p1 = pts[Math.min(i + 1, N_ROAD)];  // clamp at end for open curve
    const tx = p1.x - p.x, tz = p1.z - p.z;
    const len = Math.sqrt(tx * tx + tz * tz) || 1;
    const nx = -tz / len, nz = tx / len;

    const lx = p.x + nx * TRACK_HALF_W,  lz = p.z + nz * TRACK_HALF_W;
    const rx = p.x - nx * TRACK_HALF_W,  rz = p.z - nz * TRACK_HALF_W;

    roadVerts.push(lx, 0.01, lz,  rx, 0.01, rz);
    const t = i / N_ROAD;
    roadUVs.push(0, t,  1, t);
  }

  for (let i = 0; i < N_ROAD; i++) {
    const a = i * 2, b = a + 1, c = a + 2, d = a + 3;
    roadIdx.push(a, b, c,  b, d, c);
  }

  const roadGeo = new THREE.BufferGeometry();
  roadGeo.setAttribute('position', new THREE.Float32BufferAttribute(roadVerts, 3));
  roadGeo.setAttribute('uv',       new THREE.Float32BufferAttribute(roadUVs, 2));
  roadGeo.setIndex(roadIdx);
  roadGeo.computeVertexNormals();

  const roadMat  = new THREE.MeshLambertMaterial({ color: 0x444444, side: THREE.DoubleSide });
  const roadMesh = new THREE.Mesh(roadGeo, roadMat);
  roadMesh.receiveShadow = true;
  scene.add(roadMesh);

  // ── Edge lines (yellow) ───────────────────────────────────────────────────
  const leftPts  = [], rightPts = [], centerPts = [];
  for (let i = 0; i <= N_ROAD; i++) {
    const p  = pts[i];
    const p1 = pts[Math.min(i + 1, N_ROAD)];
    const tx = p1.x - p.x, tz = p1.z - p.z;
    const len = Math.sqrt(tx * tx + tz * tz) || 1;
    const nx = -tz / len, nz = tx / len;
    leftPts.push(new THREE.Vector3(p.x + nx * TRACK_HALF_W, 0.04, p.z + nz * TRACK_HALF_W));
    rightPts.push(new THREE.Vector3(p.x - nx * TRACK_HALF_W, 0.04, p.z - nz * TRACK_HALF_W));
    centerPts.push(new THREE.Vector3(p.x, 0.04, p.z));
  }

  const edgeMat   = new THREE.LineBasicMaterial({ color: 0xffdd00 });
  const centerMat = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 1.5, gapSize: 1.5 });

  [leftPts, rightPts].forEach(arr => {
    const geo = new THREE.BufferGeometry().setFromPoints(arr);
    scene.add(new THREE.Line(geo, edgeMat));
  });
  const cGeo = new THREE.BufferGeometry().setFromPoints(centerPts);
  const cLine = new THREE.Line(cGeo, centerMat);
  cLine.computeLineDistances();
  scene.add(cLine);

  // ── Wall physics bodies ───────────────────────────────────────────────────
  const wallPts = trackCurve.getSpacedPoints(N_WALLS);

  for (let side = -1; side <= 1; side += 2) {  // +1 = left, -1 = right
    for (let i = 0; i < N_WALLS - 1; i++) {  // N_WALLS-1 segments for open curve
      const p  = wallPts[i];
      const p1 = wallPts[i + 1];

      const tx = p1.x - p.x, tz = p1.z - p.z;
      const segLen = Math.sqrt(tx * tx + tz * tz);
      if (segLen < 0.001) continue;
      const tdx = tx / segLen, tdz = tz / segLen;
      const nx = -tdz, nz = tdx;  // left perp

      // Wall center = segment midpoint + perpendicular offset to track edge + half wall thickness
      const mx = (p.x + p1.x) * 0.5 + nx * side * (TRACK_HALF_W + WALL_T * 0.5);
      const mz = (p.z + p1.z) * 0.5 + nz * side * (TRACK_HALF_W + WALL_T * 0.5);
      const my = WALL_H * 0.5;

      // Angle: rotate box local Z to align with tangent
      const angle = Math.atan2(-tdz, tdx);

      const body = new CANNON.Body({ mass: 0, material: matWall });
      body.addShape(new CANNON.Box(new CANNON.Vec3(segLen * 0.5 + 0.05, WALL_H * 0.5, WALL_T * 0.5)));
      body.position.set(mx, my, mz);
      body.quaternion.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), angle);
      body._isWall = true;
      body.collisionFilterGroup = 2;  // walls in their own group
      body.collisionFilterMask  = -1; // walls still collide with car/wheels
      world.addBody(body);

      // Visual wall mesh
      const wGeo = new THREE.BoxGeometry(segLen + 0.1, WALL_H, WALL_T);
      const wMat = new THREE.MeshPhongMaterial({ color: side > 0 ? 0x3355aa : 0x993322, shininess: 60 });
      const wMesh = new THREE.Mesh(wGeo, wMat);
      wMesh.position.set(mx, my, mz);
      wMesh.rotation.y = angle;
      wMesh.castShadow = true;
      wMesh.receiveShadow = true;
      scene.add(wMesh);
    }
  }
}

// ─── CAR VISUAL ───────────────────────────────────────────────────────────────
const carGroup = new THREE.Group();
scene.add(carGroup);

const chassisGeo  = new THREE.BoxGeometry(CAR_BODY_W, CAR_BODY_H, CAR_BODY_L);
const chassisMat  = new THREE.MeshPhongMaterial({ color: 0xcc2233, shininess: 120 });
const chassisMesh = new THREE.Mesh(chassisGeo, chassisMat);
chassisMesh.castShadow = true;
chassisMesh.receiveShadow = true;
carGroup.add(chassisMesh);

const cabinGeo  = new THREE.BoxGeometry(CAR_BODY_W * 0.72, CAR_BODY_H * 1.4, CAR_BODY_L * 0.48);
const cabinMat  = new THREE.MeshPhongMaterial({ color: 0x223344, shininess: 200, transparent: true, opacity: 0.85 });
const cabinMesh = new THREE.Mesh(cabinGeo, cabinMat);
cabinMesh.position.set(0, CAR_BODY_H * 1.2, -CAR_BODY_L * 0.04);
cabinMesh.castShadow = true;
carGroup.add(cabinMesh);

const bumperGeo  = new THREE.BoxGeometry(CAR_BODY_W * 0.9, CAR_BODY_H * 0.5, 0.1);
const bumperMat  = new THREE.MeshPhongMaterial({ color: 0x888888, shininess: 200 });
const frontBumper = new THREE.Mesh(bumperGeo, bumperMat);
frontBumper.position.set(0, -CAR_BODY_H * 0.25, CAR_BODY_L * 0.5 + 0.05);
carGroup.add(frontBumper);

[-0.5, 0.5].forEach(sx => {
  const hGeo = new THREE.BoxGeometry(0.22, 0.1, 0.06);
  const hMat = new THREE.MeshPhongMaterial({ color: 0xffffcc, emissive: 0xffffaa, emissiveIntensity: 0.8 });
  const h = new THREE.Mesh(hGeo, hMat);
  h.position.set(sx * CAR_BODY_W * 0.72, -CAR_BODY_H * 0.05, CAR_BODY_L * 0.5 + 0.04);
  carGroup.add(h);
});

[-0.5, 0.5].forEach(sx => {
  const tGeo = new THREE.BoxGeometry(0.18, 0.1, 0.06);
  const tMat = new THREE.MeshPhongMaterial({ color: 0xff2200, emissive: 0xff1100, emissiveIntensity: 0.5 });
  const t = new THREE.Mesh(tGeo, tMat);
  t.position.set(sx * CAR_BODY_W * 0.72, -CAR_BODY_H * 0.05, -CAR_BODY_L * 0.5 - 0.04);
  carGroup.add(t);
});

function makeWheelMesh() {
  const group = new THREE.Group();
  const tireGeo = new THREE.CylinderGeometry(WHEEL_RADIUS, WHEEL_RADIUS, WHEEL_WIDTH, 28);
  const tireMat = new THREE.MeshPhongMaterial({ color: 0x151515, shininess: 20 });
  const tire = new THREE.Mesh(tireGeo, tireMat);
  tire.rotation.z = Math.PI / 2;
  tire.castShadow = true;
  group.add(tire);
  const rimGeo = new THREE.CylinderGeometry(WHEEL_RADIUS * 0.62, WHEEL_RADIUS * 0.62, WHEEL_WIDTH + 0.01, 16);
  const rimMat = new THREE.MeshPhongMaterial({ color: 0xcccccc, shininess: 300 });
  const rim    = new THREE.Mesh(rimGeo, rimMat);
  rim.rotation.z = Math.PI / 2;
  group.add(rim);
  for (let s = 0; s < 5; s++) {
    const spokeGeo = new THREE.BoxGeometry(WHEEL_WIDTH + 0.02, WHEEL_RADIUS * 0.08, WHEEL_RADIUS * 1.1);
    const spoke    = new THREE.Mesh(spokeGeo, rimMat);
    spoke.rotation.x = (s / 5) * Math.PI * 2;
    group.add(spoke);
  }
  const hubGeo = new THREE.CylinderGeometry(WHEEL_RADIUS * 0.18, WHEEL_RADIUS * 0.18, WHEEL_WIDTH + 0.02, 12);
  const hubMat = new THREE.MeshPhongMaterial({ color: 0x444466, shininess: 200 });
  const hub    = new THREE.Mesh(hubGeo, hubMat);
  hub.rotation.z = Math.PI / 2;
  group.add(hub);
  return group;
}

const wheelMeshes = WHEEL_OFFSETS.map(() => {
  const m = makeWheelMesh();
  scene.add(m);
  return m;
});

// ─── CANNON-ES PHYSICS ────────────────────────────────────────────────────────
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.81, 0) });
world.broadphase = new CANNON.SAPBroadphase(world);
world.allowSleep = false;

const matGround = new CANNON.Material('ground');
const matWheel  = new CANNON.Material('wheel');
const matBody   = new CANNON.Material('body');
const matWall   = new CANNON.Material('wall');

world.addContactMaterial(new CANNON.ContactMaterial(matWheel, matGround, {
  friction: 0.72, restitution: 0.05,
  contactEquationStiffness: 1e8, contactEquationRelaxation: 3,
  frictionEquationStiffness: 1e8,
}));
world.addContactMaterial(new CANNON.ContactMaterial(matBody, matGround, {
  friction: 0.4, restitution: 0.1,
}));
world.addContactMaterial(new CANNON.ContactMaterial(matWheel, matWall, {
  friction: 0.1, restitution: 0.3,
}));
world.addContactMaterial(new CANNON.ContactMaterial(matBody, matWall, {
  friction: 0.05, restitution: 0.35,
}));

const groundBody = new CANNON.Body({ mass: 0, material: matGround });
groundBody.addShape(new CANNON.Plane());
groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
world.addBody(groundBody);

// Build track (wall physics bodies use matWall defined above)
buildTrack();

let carBody = null;
let wheelBodies = [];
let wheelConstraints = [];

function buildCar() {
  if (carBody) {
    world.removeBody(carBody);
    wheelBodies.forEach(wb => world.removeBody(wb));
    wheelConstraints.forEach(c => world.removeConstraint(c));
  }

  carBody = new CANNON.Body({
    mass:           CAR_MASS,
    material:       matBody,
    linearDamping:  0.06,
    angularDamping: 0.35,
  });
  carBody.addShape(new CANNON.Box(new CANNON.Vec3(CAR_BODY_W / 2, CAR_BODY_H / 2, CAR_BODY_L / 2)));
  carBody.position.set(SPAWN_X, START_Y, SPAWN_Z);
  carBody.quaternion.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), SPAWN_ANGLE);
  world.addBody(carBody);

  wheelBodies = [];
  wheelConstraints = [];

  WHEEL_OFFSETS.forEach((offset, i) => {
    const wb = new CANNON.Body({
      mass:           WHEEL_MASS,
      material:       matWheel,
      linearDamping:  0.05,
      angularDamping: 0.5,
    });
    const shape = new CANNON.Cylinder(WHEEL_RADIUS, WHEEL_RADIUS, WHEEL_WIDTH, 24);
    const sq = new CANNON.Quaternion();
    sq.setFromAxisAngle(new CANNON.Vec3(0, 0, 1), Math.PI / 2);
    wb.addShape(shape, new CANNON.Vec3(), sq);

    const worldOffset = new CANNON.Vec3();
    carBody.quaternion.vmult(offset, worldOffset);
    wb.position.set(
      carBody.position.x + worldOffset.x,
      carBody.position.y + worldOffset.y,
      carBody.position.z + worldOffset.z
    );
    wb.quaternion.copy(carBody.quaternion);

    world.addBody(wb);
    wheelBodies.push(wb);

    const c = new CANNON.HingeConstraint(carBody, wb, {
      pivotA: offset,
      axisA:  new CANNON.Vec3(1, 0, 0),
      pivotB: new CANNON.Vec3(0, 0, 0),
      axisB:  new CANNON.Vec3(1, 0, 0),
      collideConnected: false,
    });
    c.enableMotor();
    c.setMotorSpeed(0);
    c.setMotorMaxForce(0);
    world.addConstraint(c);
    wheelConstraints.push(c);
  });
}

buildCar();

// ─── SENSORS ──────────────────────────────────────────────────────────────────
// Build HUD rows
const sensorHud = document.getElementById('sensor-hud');
const sensorBarEls  = [];
const sensorDistEls = [];

SENSOR_ANGLES.forEach((deg, i) => {
  const row = document.createElement('div');
  row.className = 's-row';
  row.innerHTML = `
    <span class="s-label">${deg > 0 ? '+' : ''}${deg}&deg;</span>
    <div class="s-bar-bg"><div class="s-bar-fill" id="sb${i}"></div></div>
    <span class="s-dist" id="sd${i}">&mdash;</span>
  `;
  sensorHud.appendChild(row);
  sensorBarEls.push(row.querySelector(`#sb${i}`));
  sensorDistEls.push(row.querySelector(`#sd${i}`));
});

// Sensor ray lines (visible in 3D)
const sensorLineMat = new THREE.LineBasicMaterial({ vertexColors: true });
const sensorLines = SENSOR_ANGLES.map(() => {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0, 0,0,1], 3));
  geo.setAttribute('color',    new THREE.Float32BufferAttribute([1,1,0, 1,0,0], 3));
  const line = new THREE.Line(geo, sensorLineMat);
  line.frustumCulled = false;  // bounding sphere goes stale when vertices update each frame
  scene.add(line);
  return line;
});

const _rayFrom   = new CANNON.Vec3();
const _rayTo     = new CANNON.Vec3();
const _rayResult = new CANNON.RaycastResult();

function updateSensors() {
  const pos = carBody.position;
  const SY  = pos.y; // cast from car center height

  // Car forward (local +Z) and right (local +X) in world space
  const fwdC = new CANNON.Vec3(0, 0, 1);
  const rgtC = new CANNON.Vec3(1, 0, 0);
  const fwd  = carBody.quaternion.vmult(fwdC);
  const rgt  = carBody.quaternion.vmult(rgtC);

  SENSOR_ANGLES.forEach((deg, i) => {
    const rad  = deg * Math.PI / 180;
    const cosA = Math.cos(rad), sinA = Math.sin(rad);

    // Sensor direction: rotate forward by angle around Y axis
    const dx = fwd.x * cosA + rgt.x * sinA;
    const dz = fwd.z * cosA + rgt.z * sinA;

    _rayFrom.set(pos.x, SY, pos.z);
    _rayTo.set(pos.x + dx * SENSOR_LENGTH, SY, pos.z + dz * SENSOR_LENGTH);

    _rayResult.reset();
    // collisionFilterMask: 2 → only test against wall bodies (group 2), skipping car/wheels
    world.raycastClosest(_rayFrom, _rayTo, { collisionFilterGroup: -1, collisionFilterMask: 2 }, _rayResult);

    let dist = SENSOR_LENGTH;
    let hitX = _rayTo.x, hitZ = _rayTo.z;

    if (_rayResult.hasHit) {
      dist = _rayResult.distance;
      hitX = _rayResult.hitPointWorld.x;
      hitZ = _rayResult.hitPointWorld.z;
    }

    // Update HUD
    const ratio = dist / SENSOR_LENGTH;
    const r = Math.min(1, 2 * (1 - ratio));
    const g = Math.min(1, 2 * ratio);
    const hex = `#${Math.round(r*255).toString(16).padStart(2,'0')}${Math.round(g*255).toString(16).padStart(2,'0')}00`;
    sensorBarEls[i].style.width   = `${(ratio * 100).toFixed(0)}%`;
    sensorBarEls[i].style.background = hex;
    sensorDistEls[i].textContent  = dist.toFixed(1);

    // Update 3D line
    const posArr = sensorLines[i].geometry.attributes.position.array;
    posArr[0] = pos.x; posArr[1] = SY; posArr[2] = pos.z;
    posArr[3] = hitX;  posArr[4] = SY; posArr[5] = hitZ;
    sensorLines[i].geometry.attributes.position.needsUpdate = true;

    const colArr = sensorLines[i].geometry.attributes.color.array;
    colArr[0] = r; colArr[1] = g; colArr[2] = 0;
    colArr[3] = r; colArr[4] = g; colArr[5] = 0;
    sensorLines[i].geometry.attributes.color.needsUpdate = true;
  });
}

// ─── SLIDER STATE ─────────────────────────────────────────────────────────────
const sliderValues  = [0, 0, 0, 0];
const sliderPressed = [false, false, false, false];
const SPRING_RATE   = 0.12;
const KEY_RATE      = 0.055;

const keyPress = [0, 0, 0, 0];
const KEY_MAP  = {
  KeyQ: [0,  1], KeyA: [0, -1],
  KeyW: [1,  1], KeyS: [1, -1],
  KeyE: [2,  1], KeyD: [2, -1],
  KeyR: [3,  1], KeyF: [3, -1],
};

window.addEventListener('keydown', e => {
  if (e.repeat) return;
  const m = KEY_MAP[e.code];
  if (m) { keyPress[m[0]] = m[1]; sliderPressed[m[0]] = true; }
});
window.addEventListener('keyup', e => {
  const m = KEY_MAP[e.code];
  if (m && keyPress[m[0]] === m[1]) {
    keyPress[m[0]] = 0;
    sliderPressed[m[0]] = false;
  }
});

for (let i = 0; i < 4; i++) {
  const slider = document.getElementById(`s${i}`);
  slider.addEventListener('input',       () => { sliderValues[i] = parseInt(slider.value) / 100; });
  slider.addEventListener('mousedown',   () => { sliderPressed[i] = true; });
  slider.addEventListener('touchstart',  () => { sliderPressed[i] = true; }, { passive: true });
  slider.addEventListener('mouseup',     () => { sliderPressed[i] = false; });
  slider.addEventListener('touchend',    () => { sliderPressed[i] = false; });
  slider.addEventListener('touchcancel', () => { sliderPressed[i] = false; });
}

window.addEventListener('mouseup', () => {
  for (let i = 0; i < 4; i++) {
    if (keyPress[i] === 0) sliderPressed[i] = false;
  }
});

// ─── RESET ────────────────────────────────────────────────────────────────────
document.getElementById('reset-btn').addEventListener('click', () => {
  buildCar();
  for (let i = 0; i < 4; i++) {
    sliderValues[i] = 0;
    sliderPressed[i] = false;
    document.getElementById(`s${i}`).value = 0;
    document.getElementById(`v${i}`).textContent = '0%';
  }
});

// ─── MINI-MAP ─────────────────────────────────────────────────────────────────
const mmCanvas = document.getElementById('minimap');
const mmCtx    = mmCanvas.getContext('2d');
const MM_W     = mmCanvas.width;
const MM_H     = mmCanvas.height;
const MM_CX    = MM_W / 2;
const MM_CZ    = MM_H / 2;
const MM_VIEW  = 60;   // world metres visible from centre to canvas edge
const MM_SCALE = MM_CX / MM_VIEW;

// Pre-sample track edges for minimap
const MM_SAMPLES  = 250;
const mmCenterPts = trackCurve.getSpacedPoints(MM_SAMPLES);
const mmLeftPts   = [];
const mmRightPts  = [];
for (let i = 0; i < MM_SAMPLES; i++) {
  const p  = mmCenterPts[i];
  const p1 = mmCenterPts[Math.min(i + 1, MM_SAMPLES)];
  const tx = p1.x - p.x, tz = p1.z - p.z;
  const len = Math.sqrt(tx * tx + tz * tz) || 1;
  const nx = -tz / len, nz = tx / len;
  mmLeftPts.push([p.x + nx * TRACK_HALF_W, p.z + nz * TRACK_HALF_W]);
  mmRightPts.push([p.x - nx * TRACK_HALF_W, p.z - nz * TRACK_HALF_W]);
}

// Transform a world (wx, wz) into minimap canvas coords.
// Minimap is centred on car, rotated so car forward = up.
let _mmFwdX = 0, _mmFwdZ = 1, _mmRgtX = 1, _mmRgtZ = 0;
let _mmCarX = 0, _mmCarZ = 0;

function worldToMM(wx, wz) {
  const dx = wx - _mmCarX, dz = wz - _mmCarZ;
  const r  =  dx * _mmRgtX + dz * _mmRgtZ;  // right component
  const f  =  dx * _mmFwdX + dz * _mmFwdZ;  // forward component
  return [MM_CX + r * MM_SCALE, MM_CZ - f * MM_SCALE];
}

function drawMinimap() {
  // Update transform from current car state
  const cpos = carBody.position;
  _mmCarX = cpos.x; _mmCarZ = cpos.z;
  const fwdC = carBody.quaternion.vmult(new CANNON.Vec3(0, 0, 1));
  const rgtC = carBody.quaternion.vmult(new CANNON.Vec3(1, 0, 0));
  _mmFwdX = fwdC.x; _mmFwdZ = fwdC.z;
  _mmRgtX = rgtC.x; _mmRgtZ = rgtC.z;

  mmCtx.clearRect(0, 0, MM_W, MM_H);

  // Circular clip
  mmCtx.save();
  mmCtx.beginPath();
  mmCtx.arc(MM_CX, MM_CZ, MM_CX - 1, 0, Math.PI * 2);
  mmCtx.clip();

  // Road fill
  mmCtx.beginPath();
  mmLeftPts.forEach(([x, z], i) => {
    const [px, pz] = worldToMM(x, z);
    i === 0 ? mmCtx.moveTo(px, pz) : mmCtx.lineTo(px, pz);
  });
  for (let i = mmRightPts.length - 1; i >= 0; i--) {
    const [x, z] = mmRightPts[i];
    const [px, pz] = worldToMM(x, z);
    mmCtx.lineTo(px, pz);
  }
  mmCtx.closePath();
  mmCtx.fillStyle = 'rgba(80,80,95,0.85)';
  mmCtx.fill();

  // Edge lines
  [['#ffdd00', mmLeftPts], ['#cc3322', mmRightPts]].forEach(([color, pts]) => {
    mmCtx.beginPath();
    pts.forEach(([x, z], i) => {
      const [px, pz] = worldToMM(x, z);
      i === 0 ? mmCtx.moveTo(px, pz) : mmCtx.lineTo(px, pz);
    });
    mmCtx.strokeStyle = color;
    mmCtx.lineWidth = 1.5;
    mmCtx.stroke();
  });

  // Sensor rays
  const fwd = fwdC, rgt = rgtC;
  SENSOR_ANGLES.forEach((deg, i) => {
    const rad = deg * Math.PI / 180;
    const cosA = Math.cos(rad), sinA = Math.sin(rad);
    const dx = fwd.x * cosA + rgt.x * sinA;
    const dz = fwd.z * cosA + rgt.z * sinA;
    const dist = parseFloat(sensorDistEls[i].textContent) || SENSOR_LENGTH;
    const [epx, epz] = worldToMM(cpos.x + dx * dist, cpos.z + dz * dist);
    const ratio = dist / SENSOR_LENGTH;
    const r = Math.min(1, 2 * (1 - ratio));
    const g = Math.min(1, 2 * ratio);
    mmCtx.beginPath();
    mmCtx.moveTo(MM_CX, MM_CZ);
    mmCtx.lineTo(epx, epz);
    mmCtx.strokeStyle = `rgba(${Math.round(r*255)},${Math.round(g*255)},0,0.7)`;
    mmCtx.lineWidth = 1;
    mmCtx.stroke();
  });

  // Car icon — centred at canvas centre, pointing up
  const carSize = 6;
  mmCtx.beginPath();
  mmCtx.moveTo(MM_CX,             MM_CZ - carSize * 1.6);
  mmCtx.lineTo(MM_CX - carSize,   MM_CZ + carSize);
  mmCtx.lineTo(MM_CX + carSize,   MM_CZ + carSize);
  mmCtx.closePath();
  mmCtx.fillStyle = '#cc2233';
  mmCtx.strokeStyle = '#ffffff';
  mmCtx.lineWidth = 1.5;
  mmCtx.fill();
  mmCtx.stroke();

  mmCtx.restore(); // end circular clip

  // Circle border
  mmCtx.beginPath();
  mmCtx.arc(MM_CX, MM_CZ, MM_CX - 1, 0, Math.PI * 2);
  mmCtx.strokeStyle = 'rgba(255,255,255,0.25)';
  mmCtx.lineWidth = 1.5;
  mmCtx.stroke();
}

// ─── HELPER VECS ──────────────────────────────────────────────────────────────
const _axle = new CANNON.Vec3();
const _latV  = new CANNON.Vec3();

// ─── ANIMATION LOOP ───────────────────────────────────────────────────────────
const camDesired = new THREE.Vector3();
const camLookAt  = new THREE.Vector3();
let lastTime     = null;
const FWD        = new THREE.Vector3(0, 0, 1);

function animate(time) {
  requestAnimationFrame(animate);

  const dt = lastTime !== null ? Math.min((time - lastTime) / 1000, 0.05) : 1 / 60;
  lastTime = time;

  // ── Keyboard / slider spring ──
  for (let i = 0; i < 4; i++) {
    if (keyPress[i] !== 0) {
      sliderValues[i] = Math.max(-1, Math.min(1, sliderValues[i] + keyPress[i] * KEY_RATE));
    } else if (!sliderPressed[i] && Math.abs(sliderValues[i]) > 0.001) {
      sliderValues[i] *= (1 - SPRING_RATE);
      if (Math.abs(sliderValues[i]) < 0.01) sliderValues[i] = 0;
    }
    const pct = Math.round(sliderValues[i] * 100);
    document.getElementById(`s${i}`).value = pct;
    document.getElementById(`v${i}`).textContent = pct + '%';
  }

  // ── Apply motors ──
  for (let i = 0; i < 4; i++) {
    const v = sliderValues[i];
    wheelConstraints[i].setMotorSpeed(v * MAX_MOTOR_SPEED);
    wheelConstraints[i].setMotorMaxForce(Math.abs(v) * MAX_MOTOR_FORCE);
  }

  // ── Lateral grip ──
  _axle.set(1, 0, 0);
  carBody.quaternion.vmult(_axle, _axle);

  wheelBodies.forEach(wb => {
    const vDot = wb.velocity.dot(_axle);
    _latV.set(_axle.x * vDot, _axle.y * vDot, _axle.z * vDot);
    wb.velocity.x -= _latV.x * GRIP;
    wb.velocity.y -= _latV.y * GRIP;
    wb.velocity.z -= _latV.z * GRIP;
  });

  const cbDot = carBody.velocity.dot(_axle);
  carBody.velocity.x -= _axle.x * cbDot * (GRIP * 0.7);
  carBody.velocity.y -= _axle.y * cbDot * (GRIP * 0.7);
  carBody.velocity.z -= _axle.z * cbDot * (GRIP * 0.7);

  // ── Physics step ──
  world.step(1 / 60, dt, 3);

  // ── Sync meshes ──
  carGroup.position.copy(carBody.position);
  carGroup.quaternion.copy(carBody.quaternion);

  wheelBodies.forEach((wb, i) => {
    wheelMeshes[i].position.copy(wb.position);
    wheelMeshes[i].quaternion.copy(wb.quaternion);
  });

  // ── Sensors + minimap ──
  updateSensors();
  drawMinimap();

  // ── Spin indicator ──
  wheelBodies.forEach((wb, i) => {
    const angSpd   = wb.angularVelocity.length();
    const linSpd   = wb.velocity.length();
    const expected = linSpd / WHEEL_RADIUS;
    const spinning = angSpd > expected + SPIN_THRESHOLD && angSpd > 1;
    document.getElementById(`d${i}`).classList.toggle('spinning', spinning);
  });

  // ── Camera follow ──
  const carPos = carGroup.position;
  const carQ   = carGroup.quaternion;
  const localOffset = new THREE.Vector3(0, 3.5, -8);
  localOffset.applyQuaternion(carQ);
  camDesired.copy(carPos).add(localOffset);
  camera.position.lerp(camDesired, 0.06);
  camLookAt.lerp(new THREE.Vector3(carPos.x, carPos.y + 0.5, carPos.z), 0.08);
  camera.lookAt(camLookAt);

  // ── HUD ──
  const vel   = carBody.velocity;
  document.getElementById('speed').textContent = Math.sqrt(vel.x * vel.x + vel.z * vel.z).toFixed(2);
  const fwdWorld = FWD.clone().applyQuaternion(carGroup.quaternion);
  const heading  = Math.round(Math.atan2(fwdWorld.x, fwdWorld.z) * 180 / Math.PI);
  document.getElementById('heading').textContent = ((heading % 360) + 360) % 360;

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate(0);
</script>
</body>
</html>
