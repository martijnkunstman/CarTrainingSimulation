<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Training Simulation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #0d1117;
      font-family: 'Segoe UI', Arial, sans-serif;
      user-select: none;
    }

    #canvas { display: block; width: 100vw; height: 100vh; }

    /* HUD overlay */
    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #e6edf3;
      background: rgba(13, 17, 23, 0.82);
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 13px;
      line-height: 1.8;
      backdrop-filter: blur(6px);
      min-width: 160px;
    }
    #hud .label { color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
    #hud .value { color: #58a6ff; font-weight: bold; font-size: 15px; }

    #reset-btn {
      margin-top: 10px;
      width: 100%;
      padding: 6px 0;
      background: rgba(88, 166, 255, 0.15);
      border: 1px solid rgba(88, 166, 255, 0.4);
      border-radius: 6px;
      color: #58a6ff;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #reset-btn:hover { background: rgba(88, 166, 255, 0.3); }

    /* Sensor HUD */
    #sensor-hud {
      position: fixed;
      top: 16px;
      right: 16px;
      color: #e6edf3;
      background: rgba(13, 17, 23, 0.82);
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 11px;
      backdrop-filter: blur(6px);
      min-width: 170px;
    }
    #sensor-hud .s-title {
      color: #8b949e;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .s-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .s-label {
      width: 36px;
      color: #8b949e;
      font-size: 10px;
      text-align: right;
    }
    .s-bar-bg {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
    }
    .s-bar-fill {
      height: 100%;
      border-radius: 3px;
      width: 100%;
      background: #3fb950;
      transition: width 0.05s, background 0.05s;
    }
    .s-dist {
      width: 30px;
      text-align: right;
      font-size: 10px;
      color: #58a6ff;
    }

    /* Wheel controls */
    #controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      background: rgba(13, 17, 23, 0.85);
      padding: 16px 24px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
    }

    .wheel-ctrl {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 48px;
    }

    .wheel-name {
      color: #8b949e;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .slider-wrap {
      position: relative;
      height: 130px;
      width: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slider-wrap::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      height: 1px;
      background: rgba(255,255,255,0.15);
      pointer-events: none;
    }

    input[type=range].vslider {
      -webkit-appearance: slider-vertical;
      writing-mode: vertical-lr;
      direction: rtl;
      width: 36px;
      height: 128px;
      cursor: pointer;
      accent-color: #58a6ff;
    }

    .motor-val {
      color: #58a6ff;
      font-size: 12px;
      font-weight: bold;
      min-width: 40px;
      text-align: center;
    }

    .spin-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #30363d;
      transition: background 0.1s;
    }
    .spin-dot.spinning { background: #f85149; box-shadow: 0 0 6px #f85149; }

    #legend {
      position: fixed;
      bottom: 24px;
      right: 16px;
      color: #8b949e;
      font-size: 11px;
      line-height: 1.8;
      text-align: right;
    }

    /* Mini-map */
    #minimap-wrap {
      position: fixed;
      bottom: 24px;
      left: 16px;
    }
    #minimap {
      display: block;
      width: 180px;
      height: 180px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(13, 17, 23, 0.82);
      backdrop-filter: blur(6px);
      cursor: crosshair;
    }
    .mm-zoom {
      position: absolute;
      bottom: 6px;
      right: 6px;
      display: flex;
      gap: 3px;
    }
    .mm-zoom button {
      width: 22px;
      height: 22px;
      background: rgba(13, 17, 23, 0.88);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 5px;
      color: #e6edf3;
      font-size: 16px;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      transition: background 0.12s;
    }
    .mm-zoom button:hover { background: rgba(88,166,255,0.25); }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="hud">
  <div class="label">Speed</div>
  <div class="value"><span id="speed">0.00</span> m/s</div>
  <div class="label" style="margin-top:6px">Heading</div>
  <div class="value"><span id="heading">0</span>&deg;</div>
  <button id="reset-btn">&circlearrowleft; Reset</button>
</div>

<div id="sensor-hud">
  <div class="s-title">Sensors (m)</div>
</div>

<div id="controls">
  <div class="wheel-ctrl">
    <div class="wheel-name">FL</div>
    <div class="slider-wrap">
      <input type="range" class="vslider" id="s0" min="-100" max="100" value="0">
    </div>
    <div class="motor-val" id="v0">0%</div>
    <div class="spin-dot" id="d0"></div>
  </div>
  <div class="wheel-ctrl">
    <div class="wheel-name">FR</div>
    <div class="slider-wrap">
      <input type="range" class="vslider" id="s1" min="-100" max="100" value="0">
    </div>
    <div class="motor-val" id="v1">0%</div>
    <div class="spin-dot" id="d1"></div>
  </div>
  <div class="wheel-ctrl">
    <div class="wheel-name">RL</div>
    <div class="slider-wrap">
      <input type="range" class="vslider" id="s2" min="-100" max="100" value="0">
    </div>
    <div class="motor-val" id="v2">0%</div>
    <div class="spin-dot" id="d2"></div>
  </div>
  <div class="wheel-ctrl">
    <div class="wheel-name">RR</div>
    <div class="slider-wrap">
      <input type="range" class="vslider" id="s3" min="-100" max="100" value="0">
    </div>
    <div class="motor-val" id="v3">0%</div>
    <div class="spin-dot" id="d3"></div>
  </div>
</div>

<div id="minimap-wrap">
  <canvas id="minimap" width="180" height="180"></canvas>
  <div class="mm-zoom">
    <button id="mm-minus" title="Zoom out">−</button>
    <button id="mm-plus"  title="Zoom in">+</button>
  </div>
</div>

<div id="legend">
  <b>Keyboard</b><br>
  Q / A &nbsp;= FL forward / reverse<br>
  W / S &nbsp;= FR forward / reverse<br>
  E / D &nbsp;= RL forward / reverse<br>
  R / F &nbsp;&nbsp;= RR forward / reverse<br>
  <br>
  Hold key to accelerate &mdash; release to auto-center
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import * as CANNON from 'https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js';

const WHEEL_RADIUS    = 0.35;
const WHEEL_WIDTH     = 0.25;
const CAR_BODY_W      = 1.6;
const CAR_BODY_L      = 2.4;
const CAR_BODY_H      = 0.28;
const WHEEL_X_OUT     = 0.08;
const WHEEL_Z_IN      = 0.45;
const CAR_MASS        = 500;
const WHEEL_MASS      = 10;
const MAX_MOTOR_SPEED = 60;
const MAX_MOTOR_FORCE = 280;
const GRIP            = 0.88;
const SPIN_THRESHOLD  = 3;
const START_Y         = WHEEL_RADIUS + CAR_BODY_H * 0.5 + 0.01;

const TRACK_HALF_W  = 5.5;
const WALL_H        = 1.2;
const WALL_T        = 0.4;
const N_ROAD        = 300;
const N_WALLS       = 200;

const SENSOR_ANGLES = [-90, -60, -35, -15, 0, 15, 35, 60, 90];
const SENSOR_LENGTH = 8.0;

const WX = CAR_BODY_W * 0.5 + WHEEL_X_OUT + WHEEL_WIDTH * 0.5;
const WY = WHEEL_RADIUS - START_Y;
const WZ = CAR_BODY_L * 0.5 - WHEEL_Z_IN;

const WHEEL_OFFSETS = [
  new CANNON.Vec3(-WX, WY,  WZ),
  new CANNON.Vec3( WX, WY,  WZ),
  new CANNON.Vec3(-WX, WY, -WZ),
  new CANNON.Vec3( WX, WY, -WZ),
];

const canvas   = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled   = true;
renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2535);
scene.fog        = new THREE.FogExp2(0x1a2535, 0.012);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 600);
camera.position.set(0, 5, -10);
camera.lookAt(0, 0, 0);

const ambient = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff5e0, 1.1);
sun.position.set(15, 30, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near   = 0.5;
sun.shadow.camera.far    = 300;
sun.shadow.camera.left   = -80;
sun.shadow.camera.right  = 80;
sun.shadow.camera.top    = 80;
sun.shadow.camera.bottom = -80;
sun.shadow.bias          = -0.001;
scene.add(sun);

const fill = new THREE.HemisphereLight(0x4488aa, 0x223322, 0.4);
scene.add(fill);

const groundGeo  = new THREE.PlaneGeometry(400, 400, 1, 1);
const groundMat  = new THREE.MeshLambertMaterial({ color: 0x2a3d2a });
const groundMesh = new THREE.Mesh(groundGeo, groundMat);
groundMesh.rotation.x = -Math.PI / 2;
groundMesh.receiveShadow = true;
scene.add(groundMesh);

const grid = new THREE.GridHelper(400, 80, 0x000000, 0x1e3a1e);
grid.material.opacity     = 0.4;
grid.material.transparent = true;
scene.add(grid);

const trackCtrl = [
  [ 10,   0], [ 10,  35], [ 10,  72], [ 10, 110],
  [ 10, 138], [ 14, 156], [ 28, 166], [ 45, 162], [ 58, 155],
  [ 80, 162], [100, 172], [122, 162], [142, 170],
  [160, 164], [172, 152], [175, 136], [170, 120],
  [174,  95], [168,  70],
  [162,  46], [150,  30], [132,  22],
  [108,  14], [ 82,  10], [ 60,  14], [ 42,  26],
].map(([x, z]) => new THREE.Vector3(x, 0, z));

const trackCurve = new THREE.CatmullRomCurve3(trackCtrl, false, 'catmullrom', 0.5);

const startPt  = trackCurve.getPoint(0);
const startTan = trackCurve.getTangent(0);
const SPAWN_X  = startPt.x;
const SPAWN_Z  = startPt.z;
const SPAWN_ANGLE = Math.atan2(startTan.x, startTan.z);

function buildTrack() {
  const pts = trackCurve.getSpacedPoints(N_ROAD);
  const roadVerts = [], roadUVs = [], roadIdx = [];
  for (let i = 0; i <= N_ROAD; i++) {
    const p  = pts[i];
    const p1 = pts[Math.min(i + 1, N_ROAD)];
    const tx = p1.x - p.x, tz = p1.z - p.z;
    const len = Math.sqrt(tx*tx + tz*tz) || 1;
    const nx = -tz/len, nz = tx/len;
    roadVerts.push(p.x+nx*TRACK_HALF_W, 0.01, p.z+nz*TRACK_HALF_W,
                   p.x-nx*TRACK_HALF_W, 0.01, p.z-nz*TRACK_HALF_W);
    const t = i/N_ROAD;
    roadUVs.push(0, t, 1, t);
  }
  for (let i = 0; i < N_ROAD; i++) {
    const a=i*2, b=a+1, c=a+2, d=a+3;
    roadIdx.push(a,b,c, b,d,c);
  }
  const roadGeo = new THREE.BufferGeometry();
  roadGeo.setAttribute('position', new THREE.Float32BufferAttribute(roadVerts, 3));
  roadGeo.setAttribute('uv',       new THREE.Float32BufferAttribute(roadUVs, 2));
  roadGeo.setIndex(roadIdx);
  roadGeo.computeVertexNormals();
  const roadMesh = new THREE.Mesh(roadGeo, new THREE.MeshLambertMaterial({ color: 0x444444, side: THREE.DoubleSide }));
  roadMesh.receiveShadow = true;
  scene.add(roadMesh);

  const leftPts=[], rightPts=[], centerPts=[];
  for (let i = 0; i <= N_ROAD; i++) {
    const p  = pts[i];
    const p1 = pts[Math.min(i+1, N_ROAD)];
    const tx = p1.x-p.x, tz = p1.z-p.z;
    const len = Math.sqrt(tx*tx+tz*tz)||1;
    const nx=-tz/len, nz=tx/len;
    leftPts.push(new THREE.Vector3(p.x+nx*TRACK_HALF_W, 0.04, p.z+nz*TRACK_HALF_W));
    rightPts.push(new THREE.Vector3(p.x-nx*TRACK_HALF_W, 0.04, p.z-nz*TRACK_HALF_W));
    centerPts.push(new THREE.Vector3(p.x, 0.04, p.z));
  }
  const edgeMat = new THREE.LineBasicMaterial({ color: 0xffdd00 });
  [leftPts, rightPts].forEach(arr => scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(arr), edgeMat)));
  const cLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(centerPts),
    new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 1.5, gapSize: 1.5 }));
  cLine.computeLineDistances();
  scene.add(cLine);

  const wallPts = trackCurve.getSpacedPoints(N_WALLS);
  for (let side=-1; side<=1; side+=2) {
    for (let i=0; i<N_WALLS-1; i++) {
      const p=wallPts[i], p1=wallPts[i+1];
      const tx=p1.x-p.x, tz=p1.z-p.z;
      const segLen=Math.sqrt(tx*tx+tz*tz);
      if (segLen<0.001) continue;
      const tdx=tx/segLen, tdz=tz/segLen;
      const nx=-tdz, nz=tdx;
      const mx=(p.x+p1.x)*0.5+nx*side*(TRACK_HALF_W+WALL_T*0.5);
      const mz=(p.z+p1.z)*0.5+nz*side*(TRACK_HALF_W+WALL_T*0.5);
      const angle=Math.atan2(-tdz,tdx);
      const body=new CANNON.Body({mass:0,material:matWall});
      body.addShape(new CANNON.Box(new CANNON.Vec3(segLen*0.5+0.05,WALL_H*0.5,WALL_T*0.5)));
      body.position.set(mx,WALL_H*0.5,mz);
      body.quaternion.setFromAxisAngle(new CANNON.Vec3(0,1,0),angle);
      body.collisionFilterGroup=2; body.collisionFilterMask=-1;
      world.addBody(body);
      const wMesh=new THREE.Mesh(
        new THREE.BoxGeometry(segLen+0.1,WALL_H,WALL_T),
        new THREE.MeshPhongMaterial({color:side>0?0x3355aa:0x993322,shininess:60}));
      wMesh.position.set(mx,WALL_H*0.5,mz);
      wMesh.rotation.y=angle;
      wMesh.castShadow=true; wMesh.receiveShadow=true;
      scene.add(wMesh);
    }
  }
}

const carGroup = new THREE.Group();
scene.add(carGroup);
const chassisMesh = new THREE.Mesh(
  new THREE.BoxGeometry(CAR_BODY_W, CAR_BODY_H, CAR_BODY_L),
  new THREE.MeshPhongMaterial({ color: 0xcc2233, shininess: 120 }));
chassisMesh.castShadow = true; chassisMesh.receiveShadow = true;
carGroup.add(chassisMesh);
const cabinMesh = new THREE.Mesh(
  new THREE.BoxGeometry(CAR_BODY_W*0.72, CAR_BODY_H*1.4, CAR_BODY_L*0.48),
  new THREE.MeshPhongMaterial({ color: 0x223344, shininess: 200, transparent: true, opacity: 0.85 }));
cabinMesh.position.set(0, CAR_BODY_H*1.2, -CAR_BODY_L*0.04);
cabinMesh.castShadow = true;
carGroup.add(cabinMesh);
const frontBumper = new THREE.Mesh(
  new THREE.BoxGeometry(CAR_BODY_W*0.9, CAR_BODY_H*0.5, 0.1),
  new THREE.MeshPhongMaterial({ color: 0x888888, shininess: 200 }));
frontBumper.position.set(0, -CAR_BODY_H*0.25, CAR_BODY_L*0.5+0.05);
carGroup.add(frontBumper);
[-0.5,0.5].forEach(sx => {
  const h = new THREE.Mesh(new THREE.BoxGeometry(0.22,0.1,0.06),
    new THREE.MeshPhongMaterial({color:0xffffcc,emissive:0xffffaa,emissiveIntensity:0.8}));
  h.position.set(sx*CAR_BODY_W*0.72,-CAR_BODY_H*0.05,CAR_BODY_L*0.5+0.04);
  carGroup.add(h);
});
[-0.5,0.5].forEach(sx => {
  const t = new THREE.Mesh(new THREE.BoxGeometry(0.18,0.1,0.06),
    new THREE.MeshPhongMaterial({color:0xff2200,emissive:0xff1100,emissiveIntensity:0.5}));
  t.position.set(sx*CAR_BODY_W*0.72,-CAR_BODY_H*0.05,-CAR_BODY_L*0.5-0.04);
  carGroup.add(t);
});

function makeWheelMesh() {
  const g = new THREE.Group();
  const tireMat = new THREE.MeshPhongMaterial({ color: 0x151515, shininess: 20 });
  const rimMat  = new THREE.MeshPhongMaterial({ color: 0xcccccc, shininess: 300 });
  const tire = new THREE.Mesh(new THREE.CylinderGeometry(WHEEL_RADIUS,WHEEL_RADIUS,WHEEL_WIDTH,28), tireMat);
  tire.rotation.z = Math.PI/2; tire.castShadow = true; g.add(tire);
  const rim = new THREE.Mesh(new THREE.CylinderGeometry(WHEEL_RADIUS*0.62,WHEEL_RADIUS*0.62,WHEEL_WIDTH+0.01,16), rimMat);
  rim.rotation.z = Math.PI/2; g.add(rim);
  for (let s=0;s<5;s++) {
    const spoke = new THREE.Mesh(new THREE.BoxGeometry(WHEEL_WIDTH+0.02,WHEEL_RADIUS*0.08,WHEEL_RADIUS*1.1), rimMat);
    spoke.rotation.x = s/5*Math.PI*2; g.add(spoke);
  }
  const hub = new THREE.Mesh(new THREE.CylinderGeometry(WHEEL_RADIUS*0.18,WHEEL_RADIUS*0.18,WHEEL_WIDTH+0.02,12),
    new THREE.MeshPhongMaterial({color:0x444466,shininess:200}));
  hub.rotation.z = Math.PI/2; g.add(hub);
  return g;
}
const wheelMeshes = WHEEL_OFFSETS.map(() => { const m=makeWheelMesh(); scene.add(m); return m; });

const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.81, 0) });
world.broadphase = new CANNON.SAPBroadphase(world);
world.allowSleep = false;

const matGround = new CANNON.Material('ground');
const matWheel  = new CANNON.Material('wheel');
const matBody   = new CANNON.Material('body');
const matWall   = new CANNON.Material('wall');

world.addContactMaterial(new CANNON.ContactMaterial(matWheel, matGround, {
  friction: 0.72, restitution: 0.0,
  contactEquationStiffness: 1e8, contactEquationRelaxation: 3,
  frictionEquationStiffness: 1e8,
}));
world.addContactMaterial(new CANNON.ContactMaterial(matBody, matGround, { friction: 0.4, restitution: 0.0 }));
world.addContactMaterial(new CANNON.ContactMaterial(matWheel, matWall,  { friction: 0.1, restitution: 0.3 }));
world.addContactMaterial(new CANNON.ContactMaterial(matBody,  matWall,  { friction: 0.05, restitution: 0.35 }));

const groundBody = new CANNON.Body({ mass: 0, material: matGround });
groundBody.addShape(new CANNON.Plane());
groundBody.quaternion.setFromEuler(-Math.PI/2, 0, 0);
world.addBody(groundBody);

buildTrack();

let carBody = null, wheelBodies = [], wheelConstraints = [];

function buildCar() {
  if (carBody) {
    world.removeBody(carBody);
    wheelBodies.forEach(wb => world.removeBody(wb));
    wheelConstraints.forEach(c => world.removeConstraint(c));
  }
  carBody = new CANNON.Body({
    mass: CAR_MASS, material: matBody,
    linearDamping: 0.08, angularDamping: 0.92,
  });
  carBody.addShape(new CANNON.Box(new CANNON.Vec3(CAR_BODY_W/2, CAR_BODY_H/2, CAR_BODY_L/2)));
  carBody.position.set(SPAWN_X, START_Y, SPAWN_Z);
  carBody.quaternion.setFromAxisAngle(new CANNON.Vec3(0,1,0), SPAWN_ANGLE);
  world.addBody(carBody);

  wheelBodies = []; wheelConstraints = [];
  WHEEL_OFFSETS.forEach((offset) => {
    const wb = new CANNON.Body({ mass: WHEEL_MASS, material: matWheel, linearDamping: 0.05, angularDamping: 0.85 });
    const sq = new CANNON.Quaternion();
    sq.setFromAxisAngle(new CANNON.Vec3(0,0,1), Math.PI/2);
    wb.addShape(new CANNON.Cylinder(WHEEL_RADIUS,WHEEL_RADIUS,WHEEL_WIDTH,24), new CANNON.Vec3(), sq);
    const wo = new CANNON.Vec3();
    carBody.quaternion.vmult(offset, wo);
    wb.position.set(carBody.position.x+wo.x, carBody.position.y+wo.y, carBody.position.z+wo.z);
    wb.quaternion.copy(carBody.quaternion);
    world.addBody(wb);
    wheelBodies.push(wb);
    const c = new CANNON.HingeConstraint(carBody, wb, {
      pivotA: offset, axisA: new CANNON.Vec3(1,0,0),
      pivotB: new CANNON.Vec3(0,0,0), axisB: new CANNON.Vec3(1,0,0),
      collideConnected: false,
    });
    c.enableMotor(); c.setMotorSpeed(0); c.setMotorMaxForce(0);
    world.addConstraint(c);
    wheelConstraints.push(c);
  });
}
buildCar();

const sensorHud = document.getElementById('sensor-hud');
const sensorBarEls = [], sensorDistEls = [];
SENSOR_ANGLES.forEach((deg, i) => {
  const row = document.createElement('div');
  row.className = 's-row';
  row.innerHTML = `<span class="s-label">${deg>0?'+':''}${deg}&deg;</span><div class="s-bar-bg"><div class="s-bar-fill" id="sb${i}"></div></div><span class="s-dist" id="sd${i}">&mdash;</span>`;
  sensorHud.appendChild(row);
  sensorBarEls.push(row.querySelector(`#sb${i}`));
  sensorDistEls.push(row.querySelector(`#sd${i}`));
});

const sensorLineMat = new THREE.LineBasicMaterial({ vertexColors: true });
const sensorLines = SENSOR_ANGLES.map(() => {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0,0,0,1], 3));
  geo.setAttribute('color',    new THREE.Float32BufferAttribute([1,1,0,1,0,0], 3));
  const line = new THREE.Line(geo, sensorLineMat);
  line.frustumCulled = false;
  scene.add(line);
  return line;
});
const _rayFrom=new CANNON.Vec3(), _rayTo=new CANNON.Vec3(), _rayResult=new CANNON.RaycastResult();

function updateSensors() {
  const pos=carBody.position, SY=pos.y;
  const fwd=carBody.quaternion.vmult(new CANNON.Vec3(0,0,1));
  const rgt=carBody.quaternion.vmult(new CANNON.Vec3(1,0,0));
  SENSOR_ANGLES.forEach((deg, i) => {
    const rad=deg*Math.PI/180, cosA=Math.cos(rad), sinA=Math.sin(rad);
    const dx=fwd.x*cosA+rgt.x*sinA, dz=fwd.z*cosA+rgt.z*sinA;
    _rayFrom.set(pos.x,SY,pos.z);
    _rayTo.set(pos.x+dx*SENSOR_LENGTH, SY, pos.z+dz*SENSOR_LENGTH);
    _rayResult.reset();
    world.raycastClosest(_rayFrom,_rayTo,{collisionFilterGroup:-1,collisionFilterMask:2},_rayResult);
    let dist=SENSOR_LENGTH, hitX=_rayTo.x, hitZ=_rayTo.z;
    if (_rayResult.hasHit) { dist=_rayResult.distance; hitX=_rayResult.hitPointWorld.x; hitZ=_rayResult.hitPointWorld.z; }
    const ratio=dist/SENSOR_LENGTH;
    const r=Math.min(1,2*(1-ratio)), g=Math.min(1,2*ratio);
    sensorBarEls[i].style.width=`${(ratio*100).toFixed(0)}%`;
    sensorBarEls[i].style.background=`#${Math.round(r*255).toString(16).padStart(2,'0')}${Math.round(g*255).toString(16).padStart(2,'0')}00`;
    sensorDistEls[i].textContent=dist.toFixed(1);
    const pa=sensorLines[i].geometry.attributes.position.array;
    pa[0]=pos.x;pa[1]=SY;pa[2]=pos.z;pa[3]=hitX;pa[4]=SY;pa[5]=hitZ;
    sensorLines[i].geometry.attributes.position.needsUpdate=true;
    const ca=sensorLines[i].geometry.attributes.color.array;
    ca[0]=r;ca[1]=g;ca[2]=0;ca[3]=r;ca[4]=g;ca[5]=0;
    sensorLines[i].geometry.attributes.color.needsUpdate=true;
  });
}

const sliderValues=[0,0,0,0], sliderPressed=[false,false,false,false];
const SPRING_RATE=0.12, KEY_RATE=0.055;
const keyPress=[0,0,0,0];
const KEY_MAP={ KeyQ:[0,1],KeyA:[0,-1],KeyW:[1,1],KeyS:[1,-1],KeyE:[2,1],KeyD:[2,-1],KeyR:[3,1],KeyF:[3,-1] };
window.addEventListener('keydown', e => { if(e.repeat)return; const m=KEY_MAP[e.code]; if(m){keyPress[m[0]]=m[1];sliderPressed[m[0]]=true;} });
window.addEventListener('keyup',   e => { const m=KEY_MAP[e.code]; if(m&&keyPress[m[0]]===m[1]){keyPress[m[0]]=0;sliderPressed[m[0]]=false;} });
for (let i=0;i<4;i++) {
  const s=document.getElementById(`s${i}`);
  s.addEventListener('input',       () => { sliderValues[i]=parseInt(s.value)/100; });
  s.addEventListener('mousedown',   () => { sliderPressed[i]=true; });
  s.addEventListener('touchstart',  () => { sliderPressed[i]=true; }, {passive:true});
  s.addEventListener('mouseup',     () => { sliderPressed[i]=false; });
  s.addEventListener('touchend',    () => { sliderPressed[i]=false; });
  s.addEventListener('touchcancel', () => { sliderPressed[i]=false; });
}
window.addEventListener('mouseup', () => { for(let i=0;i<4;i++) if(keyPress[i]===0) sliderPressed[i]=false; });

document.getElementById('reset-btn').addEventListener('click', () => {
  buildCar();
  for (let i=0;i<4;i++) { sliderValues[i]=0;sliderPressed[i]=false;document.getElementById(`s${i}`).value=0;document.getElementById(`v${i}`).textContent='0%'; }
});

const mmCanvas=document.getElementById('minimap'), mmCtx=mmCanvas.getContext('2d');
const MM_W=mmCanvas.width, MM_H=mmCanvas.height, MM_CX=MM_W/2, MM_CZ=MM_H/2;
let mmView=60;
mmCanvas.addEventListener('wheel', e => { e.preventDefault(); mmView=Math.max(15,Math.min(220,mmView*(e.deltaY>0?1.18:0.847))); }, {passive:false});
document.getElementById('mm-plus') .addEventListener('click', () => { mmView=Math.max(15, mmView*0.75); });
document.getElementById('mm-minus').addEventListener('click', () => { mmView=Math.min(220,mmView*1.33); });

const MM_SAMPLES=250;
const mmCenterPts=trackCurve.getSpacedPoints(MM_SAMPLES);
const mmLeftPts=[], mmRightPts=[];
for (let i=0;i<MM_SAMPLES;i++) {
  const p=mmCenterPts[i], p1=mmCenterPts[Math.min(i+1,MM_SAMPLES)];
  const tx=p1.x-p.x,tz=p1.z-p.z,len=Math.sqrt(tx*tx+tz*tz)||1;
  const nx=-tz/len,nz=tx/len;
  mmLeftPts.push([p.x+nx*TRACK_HALF_W, p.z+nz*TRACK_HALF_W]);
  mmRightPts.push([p.x-nx*TRACK_HALF_W, p.z-nz*TRACK_HALF_W]);
}
let _mmFwdX=0,_mmFwdZ=1,_mmRgtX=1,_mmRgtZ=0,_mmCarX=0,_mmCarZ=0;
function worldToMM(wx,wz) {
  const scale=MM_CX/mmView, dx=wx-_mmCarX, dz=wz-_mmCarZ;
  return [MM_CX-(dx*_mmRgtX+dz*_mmRgtZ)*scale, MM_CZ-(dx*_mmFwdX+dz*_mmFwdZ)*scale];
}
function drawMinimap() {
  const cpos=carBody.position;
  _mmCarX=cpos.x; _mmCarZ=cpos.z;
  const fwdC=carBody.quaternion.vmult(new CANNON.Vec3(0,0,1));
  const rgtC=carBody.quaternion.vmult(new CANNON.Vec3(1,0,0));
  _mmFwdX=fwdC.x;_mmFwdZ=fwdC.z;_mmRgtX=rgtC.x;_mmRgtZ=rgtC.z;
  mmCtx.clearRect(0,0,MM_W,MM_H);
  mmCtx.save();
  mmCtx.beginPath(); mmCtx.arc(MM_CX,MM_CZ,MM_CX-1,0,Math.PI*2); mmCtx.clip();
  mmCtx.beginPath();
  mmLeftPts.forEach(([x,z],i)=>{ const[px,pz]=worldToMM(x,z); i===0?mmCtx.moveTo(px,pz):mmCtx.lineTo(px,pz); });
  for(let i=mmRightPts.length-1;i>=0;i--){ const[x,z]=mmRightPts[i],[px,pz]=worldToMM(x,z); mmCtx.lineTo(px,pz); }
  mmCtx.closePath(); mmCtx.fillStyle='rgba(80,80,95,0.85)'; mmCtx.fill();
  [['#ffdd00',mmLeftPts],['#cc3322',mmRightPts]].forEach(([color,pts])=>{
    mmCtx.beginPath();
    pts.forEach(([x,z],i)=>{ const[px,pz]=worldToMM(x,z); i===0?mmCtx.moveTo(px,pz):mmCtx.lineTo(px,pz); });
    mmCtx.strokeStyle=color; mmCtx.lineWidth=1.5; mmCtx.stroke();
  });
  SENSOR_ANGLES.forEach((deg,i)=>{
    const rad=deg*Math.PI/180,cosA=Math.cos(rad),sinA=Math.sin(rad);
    const dx=fwdC.x*cosA+rgtC.x*sinA, dz=fwdC.z*cosA+rgtC.z*sinA;
    const dist=parseFloat(sensorDistEls[i].textContent)||SENSOR_LENGTH;
    const[epx,epz]=worldToMM(cpos.x+dx*dist,cpos.z+dz*dist);
    const ratio=dist/SENSOR_LENGTH,r=Math.min(1,2*(1-ratio)),g=Math.min(1,2*ratio);
    mmCtx.beginPath(); mmCtx.moveTo(MM_CX,MM_CZ); mmCtx.lineTo(epx,epz);
    mmCtx.strokeStyle=`rgba(${Math.round(r*255)},${Math.round(g*255)},0,0.7)`;
    mmCtx.lineWidth=1; mmCtx.stroke();
  });
  const cs=6;
  mmCtx.beginPath();
  mmCtx.moveTo(MM_CX,MM_CZ-cs*1.6); mmCtx.lineTo(MM_CX-cs,MM_CZ+cs); mmCtx.lineTo(MM_CX+cs,MM_CZ+cs);
  mmCtx.closePath(); mmCtx.fillStyle='#cc2233'; mmCtx.strokeStyle='#ffffff'; mmCtx.lineWidth=1.5;
  mmCtx.fill(); mmCtx.stroke();
  mmCtx.restore();
  mmCtx.beginPath(); mmCtx.arc(MM_CX,MM_CZ,MM_CX-1,0,Math.PI*2);
  mmCtx.strokeStyle='rgba(255,255,255,0.25)'; mmCtx.lineWidth=1.5; mmCtx.stroke();
}

const _axle=new CANNON.Vec3(), _latV=new CANNON.Vec3();
const camDesired=new THREE.Vector3(), camLookAt=new THREE.Vector3();
let lastTime=null;
const FWD=new THREE.Vector3(0,0,1);

function animate(time) {
  requestAnimationFrame(animate);
  const dt=lastTime!==null?Math.min((time-lastTime)/1000,0.05):1/60;
  lastTime=time;

  for (let i=0;i<4;i++) {
    if (keyPress[i]!==0) sliderValues[i]=Math.max(-1,Math.min(1,sliderValues[i]+keyPress[i]*KEY_RATE));
    else if (!sliderPressed[i]&&Math.abs(sliderValues[i])>0.001) {
      sliderValues[i]*=(1-SPRING_RATE);
      if (Math.abs(sliderValues[i])<0.01) sliderValues[i]=0;
    }
    const pct=Math.round(sliderValues[i]*100);
    document.getElementById(`s${i}`).value=pct;
    document.getElementById(`v${i}`).textContent=pct+'%';
  }

  for (let i=0;i<4;i++) {
    wheelConstraints[i].setMotorSpeed(sliderValues[i]*MAX_MOTOR_SPEED);
    wheelConstraints[i].setMotorMaxForce(Math.abs(sliderValues[i])*MAX_MOTOR_FORCE);
  }

  _axle.set(1,0,0); carBody.quaternion.vmult(_axle,_axle);
  wheelBodies.forEach(wb=>{
    const vd=wb.velocity.dot(_axle);
    _latV.set(_axle.x*vd,_axle.y*vd,_axle.z*vd);
    wb.velocity.x-=_latV.x*GRIP; wb.velocity.y-=_latV.y*GRIP; wb.velocity.z-=_latV.z*GRIP;
  });
  const cbd=carBody.velocity.dot(_axle);
  carBody.velocity.x-=_axle.x*cbd*(GRIP*0.7);
  carBody.velocity.y-=_axle.y*cbd*(GRIP*0.7);
  carBody.velocity.z-=_axle.z*cbd*(GRIP*0.7);

  world.step(1/60,dt,3);

  carGroup.position.copy(carBody.position);
  carGroup.quaternion.copy(carBody.quaternion);
  wheelBodies.forEach((wb,i)=>{ wheelMeshes[i].position.copy(wb.position); wheelMeshes[i].quaternion.copy(wb.quaternion); });

  updateSensors();
  drawMinimap();

  wheelBodies.forEach((wb,i)=>{
    const a=wb.angularVelocity.length(),l=wb.velocity.length();
    document.getElementById(`d${i}`).classList.toggle('spinning',a>l/WHEEL_RADIUS+SPIN_THRESHOLD&&a>1);
  });

  const carPos=carGroup.position, carQ=carGroup.quaternion;
  const lo=new THREE.Vector3(0,3.5,-8); lo.applyQuaternion(carQ);
  camDesired.copy(carPos).add(lo);
  camera.position.lerp(camDesired,0.06);
  camLookAt.lerp(new THREE.Vector3(carPos.x,carPos.y+0.5,carPos.z),0.08);
  camera.lookAt(camLookAt);

  const vel=carBody.velocity;
  document.getElementById('speed').textContent=Math.sqrt(vel.x*vel.x+vel.z*vel.z).toFixed(2);
  const fw=FWD.clone().applyQuaternion(carGroup.quaternion);
  document.getElementById('heading').textContent=(((Math.round(Math.atan2(fw.x,fw.z)*180/Math.PI))%360)+360)%360;

  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

animate(0);
</script>
</body>
</html>
